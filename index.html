<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .heart {
    width: 300px;
    height: 300px;
    background: #cc0000;
    position: relative;
    transform: rotate(-45deg);
    animation: pulse 1.2s ease-in-out infinite;
    box-shadow: 0 0 60px rgba(200,0,0,0.6), 0 0 120px rgba(200,0,0,0.3);
  }
  .heart::before,
  .heart::after {
    content: '';
    width: 300px;
    height: 300px;
    background: #cc0000;
    border-radius: 50%;
    position: absolute;
  }
  .heart::before { top: -150px; left: 0; }
  .heart::after  { left: 150px; top: 0; }
  @keyframes pulse {
    0%, 100% { transform: rotate(-45deg) scale(1); }
    15%       { transform: rotate(-45deg) scale(1.08); }
    30%       { transform: rotate(-45deg) scale(1); }
    45%       { transform: rotate(-45deg) scale(1.05); }
  }
</style>
</head>
<body>
  <div class="heart"></div>
</body>
</html>
